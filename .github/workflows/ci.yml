name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libclang-dev

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: none
          coverage: none

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (PHP ${{ matrix.php }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]   # macos-14 is the arm64 runner
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libclang-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
          coverage: none

      - name: Fetch run-tests.php
        run: |
          PHP_VERSION=$(php -r 'echo PHP_VERSION;')
          curl -sSL "https://raw.githubusercontent.com/php/php-src/PHP-${PHP_VERSION%.*}/run-tests.php" -o run-tests.php
          test -s run-tests.php

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Sanity-load the extension
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then SUFFIX=dylib; else SUFFIX=so; fi
          EXT="$PWD/target/debug/libinfer.$SUFFIX"
          test -f "$EXT"
          php -d extension="$EXT" -r 'if (!extension_loaded("infer")) { fwrite(STDERR, "infer not loaded\n"); exit(1); } echo "ok\n";'

      - name: Run PHPT tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then SUFFIX=dylib; else SUFFIX=so; fi
          EXT="$PWD/target/debug/libinfer.$SUFFIX"
          # `run-tests.php` parses TEST_PHP_ARGS by splitting on single spaces,
          # so the ini override must be `-d extension=...` (with the space).
          TEST_PHP_EXECUTABLE=$(which php) \
          TEST_PHP_ARGS="-d extension=$EXT" \
            php run-tests.php -q --show-diff tests/phpt
